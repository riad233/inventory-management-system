# Redis Configuration for IMS Application

# Network
bind 0.0.0.0
port 6379
timeout 0
tcp-backlog 511
tcp-keepalive 300

# General
daemonize no
supervised no
pidfile /var/run/redis_6379.pid
loglevel notice
logfile ""
databases 16

# Snapshotting (persistence)
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF (Append Only File)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Client management
maxclients 10000

# Performance tuning
hz 10
dynamic-hz yes

# Security
requirepass ${REDIS_PASSWORD:-redis_password}
masterauth ${REDIS_PASSWORD:-redis_password}

# LRU and LFU eviction
# maxmemory-samples 5

# Slowlog
slowlog-log-slower-than 10000
slowlog-max-len 128

# Event notification
notify-keyspace-events ""

# Lua scripting
lua-time-limit 5000

# Cluster mode (disabled)
# cluster-enabled no

# Replication (optional)
# slaveof no one
# min-slaves-to-write 0
# min-slaves-max-lag 10
