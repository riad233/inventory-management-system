# Kubernetes Deployment Configuration
# For production deployment on Kubernetes clusters

apiVersion: v1
kind: Namespace
metadata:
  name: ims-production
  labels:
    name: ims-production

---

# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: ims-config
  namespace: ims-production
data:
  APP_ENV: "production"
  APP_DEBUG: "false"
  CACHE_DRIVER: "redis"
  SESSION_DRIVER: "redis"
  QUEUE_DRIVER: "redis"

---

# Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: ims-secrets
  namespace: ims-production
type: Opaque
stringData:
  DB_PASSWORD: "secure_database_password"
  REDIS_PASSWORD: "redis_password"
  APP_KEY: "base64:your_application_key_here"
  JWT_SECRET: "your_jwt_secret_here"
  ENCRYPTION_KEY: "your_encryption_key_here"

---

# PersistentVolume for data storage
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ims-data-pv
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd
  nfs:
    server: nfs.production.internal
    path: "/ims-data"

---

# PersistentVolumeClaim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ims-data-pvc
  namespace: ims-production
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 50Gi

---

# Application Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ims-app
  namespace: ims-production
  labels:
    app: ims
    tier: application
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: ims
      tier: application
  template:
    metadata:
      labels:
        app: ims
        tier: application
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: ims-app
      
      containers:
      - name: ims
        image: ghcr.io/your-org/ims:latest
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        
        env:
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: ims-config
              key: APP_ENV
        - name: DB_HOST
          value: "mysql-primary.ims-production.svc.cluster.local"
        - name: DB_PORT
          value: "3306"
        - name: DB_NAME
          value: "ims_db"
        - name: DB_USER
          value: "ims_user"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ims-secrets
              key: DB_PASSWORD
        - name: REDIS_HOST
          value: "redis-cluster.ims-production.svc.cluster.local"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ims-secrets
              key: REDIS_PASSWORD
        
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        
        livenessProbe:
          httpGet:
            path: /api/health/status
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /api/health/status
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        volumeMounts:
        - name: data
          mountPath: /var/www/html/public/uploads
        - name: logs
          mountPath: /var/www/html/storage/logs
      
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: ims-data-pvc
      - name: logs
        emptyDir: {}

---

# Service for application
apiVersion: v1
kind: Service
metadata:
  name: ims-service
  namespace: ims-production
  labels:
    app: ims
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: ims
    tier: application

---

# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ims-hpa
  namespace: ims-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ims-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60

---

# Ingress Configuration
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ims-ingress
  namespace: ims-production
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "10"
    nginx.ingress.kubernetes.io/rate-limit-window: "60"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - ims.example.com
    - api.ims.example.com
    secretName: ims-tls-cert
  rules:
  - host: ims.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ims-service
            port:
              number: 80
  - host: api.ims.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: ims-service
            port:
              number: 80

---

# ServiceAccount for RBAC
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ims-app
  namespace: ims-production

---

# Role for application
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ims-app-role
  namespace: ims-production
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]

---

# RoleBinding for application
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ims-app-rolebinding
  namespace: ims-production
subjects:
- kind: ServiceAccount
  name: ims-app
  namespace: ims-production
roleRef:
  kind: Role
  name: ims-app-role
  apiGroup: rbac.authorization.k8s.io

---

# Network Policy for security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ims-network-policy
  namespace: ims-production
spec:
  podSelector:
    matchLabels:
      app: ims
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 80
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 3306
    - protocol: TCP
      port: 6379
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
