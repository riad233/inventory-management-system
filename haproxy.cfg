# HAProxy Load Balancing Configuration
# High-availability proxy for load balancing and failover

global
    maxconn 100000
    log stdout local0
    log stdout local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

    # Default SSL material locations
    ca-base /etc/ssl/certs
    crt-base /etc/ssl/private

    # SSL/TLS configuration
    tune.ssl.default-dh-param 2048
    ssl-default-bind-ciphers HIGH:!aNULL:!MD5
    ssl-default-bind-options ssl-min-ver TLSv1.2

defaults
    mode http
    log global
    option httplog
    option denyall-on-404
    option forwardfor
    option http-server-close
    retries 3
    timeout connect 5000
    timeout client 50000
    timeout server 50000

    # Error files
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

# Statistics page
listen stats
    bind *:8404
    stats enable
    stats admin if TRUE
    stats uri /stats
    stats refresh 30s
    stats show-legends
    stats show-node
    stats admin if LOCALHOST

# Frontend for HTTP (redirect to HTTPS)
frontend http_frontend
    bind *:80
    mode http
    option httpclose
    
    # Redirect to HTTPS
    redirect scheme https code 301 if !{ ssl_fc }

# Frontend for HTTPS
frontend https_frontend
    bind *:443 ssl crt /etc/haproxy/ssl/ims.pem
    mode http
    
    # Request rate limiting
    stick-table type ip size 100k expire 30s store http_req_rate(10s)
    http-request track-sc0 src
    http-request deny if { sc_http_req_rate(0) gt 100 }
    
    # Security headers
    http-response add-header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    http-response add-header X-Content-Type-Options "nosniff"
    http-response add-header X-Frame-Options "SAMEORIGIN"
    http-response add-header X-XSS-Protection "1; mode=block"
    http-response add-header Referrer-Policy "strict-origin-when-cross-origin"
    
    # Request/response capture for logging
    unique-id-format %{+X}o\ %ci:%cp_%fi:%fp_%Ts_%pid_%{+X}r
    unique-id-header X-Unique-ID
    
    # Host-based routing
    acl is_api hdr(host) -i api.ims.example.com
    acl is_app hdr(host) -i ims.example.com www.ims.example.com
    
    # Path-based routing
    acl is_health path /api/health
    
    # API routing with stricter limits
    use_backend api_servers if is_api
    use_backend app_servers if is_app
    
    # Default
    default_backend app_servers

# Backend for application servers
backend app_servers
    mode http
    balance roundrobin
    option forwardfor
    option httpchk GET /api/health/status HTTP/1.1\r\nHost:\ ims.example.com
    
    # Cookie persistence
    cookie SERVERID insert indirect nocache
    
    # Servers with health checks
    server app1 app1:80 check inter 5s fall 3 rise 2 cookie app1
    server app2 app2:80 check inter 5s fall 3 rise 2 cookie app2
    server app3 app3:80 check inter 5s fall 3 rise 2 cookie app3 backup
    
    # Connection settings
    timeout connect 5000
    timeout server 50000
    
    # Logging
    log-format "%ci:%cp [%tr] %ft %b/%s %TR/%Tw/%Tc/%Tr/%Ta %ST %B %CC %CS %tsc %ac/%fc/%bc/%sc/%rc %sq/%bq %hr %hs %{+Q}r"

# Backend for API servers
backend api_servers
    mode http
    balance least_conn
    option forwardfor
    option httpchk GET /api/health/status HTTP/1.1\r\nHost:\ api.ims.example.com
    
    # Rate limiting per server
    stick-table type ip size 100k expire 10m store http_req_rate(10s)
    http-request track-sc0 src
    
    # Servers with stricter health checks
    server api1 app1:80 check inter 3s fall 2 rise 1 weight 100
    server api2 app2:80 check inter 3s fall 2 rise 1 weight 100
    server api3 app3:80 check inter 3s fall 2 rise 1 weight 50 backup
    
    # Connection pooling
    http-reuse safe
    
    # Timeout settings for API
    timeout connect 3000
    timeout server 30000
    
    # Compression
    compression algo gzip
    compression type text/html text/plain text/css text/javascript application/json application/javascript

# Backend for health checks only (no caching)
backend health_backend
    mode http
    balance roundrobin
    option httpchk GET /api/health/status HTTP/1.1\r\nHost:\ ims.example.com
    
    server app1 app1:80 check inter 10s fall 2 rise 1
    server app2 app2:80 check inter 10s fall 2 rise 1
    server app3 app3:80 check inter 10s fall 2 rise 1
    
    timeout connect 1000
    timeout server 5000
