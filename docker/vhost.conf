# Virtual Host Configuration for IMS Application

<VirtualHost *:80>
    ServerAdmin admin@ims.local
    ServerName ims.local
    ServerAlias www.ims.local api.ims.local

    # Document root
    DocumentRoot /var/www/html/public

    # Directory configuration
    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # RewriteEngine for routing
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^(.*)$ index.php?url=$1 [QSA,L]
        </IfModule>
    </Directory>

    # Prevent access to application root
    <Directory /var/www/html>
        Options -Indexes
        Require all denied
    </Directory>

    # Allow access to storage uploads
    <Directory /var/www/html/public/uploads>
        Options +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Logging
    CustomLog ${APACHE_LOG_DIR}/ims_access.log combined
    ErrorLog ${APACHE_LOG_DIR}/ims_error.log

    # Performance settings
    <IfModule mod_php.c>
        php_value upload_max_filesize 50M
        php_value post_max_size 50M
        php_value memory_limit 256M
        php_value max_execution_time 300
    </IfModule>
</VirtualHost>

